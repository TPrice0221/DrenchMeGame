<!DOCTYPE html>
<html>
<head>
  <title>Drench Me</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Rubik+Wet+Paint&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      background: url('drenchme.jpg') no-repeat center center;
      background-size: cover;
      color: white;
      font-family: 'Rubik Wet Paint', cursive;
      text-align: center;
      overflow: hidden;
     
    }
    .droplet {
  position: absolute;
  width: 12px;
  height: 12px;
  background: cyan;
  border-radius: 2000%;
  pointer-events: none;
  animation: dropletAnim 500ms ease-out forwards;
}

@keyframes dropletAnim {
  0% {
    transform: translate(0, 0) scale(1);
    opacity: 1;
  }

  40% {
    transform: translate(calc(var(--x) * 0.6), calc(var(--y) * 0.6 - 20px)) scale(1);
  }

  100% {
    transform: translate(var(--x), calc(var(--y) + 40px)) scale(0.4);
    opacity: 0;
  }

}
    h1 {
  font-size: 48px;
  letter-spacing: 2px;
}

#feedback {
  font-size: 26px;
  text-shadow: 0 0 10px #00e5ff, 0 0 20px #00bfff;
}
    #leaderboard {
  margin-top: 20px;
    }
    h1 {
  margin: 0;
  padding-top: 20px;
}
    
    /* 💧 SPLASH EFFECT */
#target.splash {
  animation: splashAnim 0.3s ease;
}
    #endScreen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;

  display: none;

  flex-direction: column;
  align-items: center;
  justify-content: center;

  z-index: 30;
  text-align: center;
}

#endContent {
  margin-top: 80px;
}

@keyframes splashAnim {
  0% {
    transform: scale(0.8);
    opacity: 0.8;
    box-shadow: 0 0 0px rgba(0, 255, 255, 0);
  }

  30% {
    transform: scale(1.4);
    opacity: 1;
    box-shadow: 0 0 80px rgba(0, 255, 255, 0.9);
  }

  60% {
    transform: scale(1.8);
    opacity: 0.6;
    box-shadow: 0 0 120px rgba(0, 255, 255, 0.6);
  }

  100% {
    transform: scale(2.2);
    opacity: 0;
    box-shadow: 0 0 160px rgba(0, 255, 255, 0);
  }
}

/* 🏜 DRY EFFECT */
#target.dry {
  filter: grayscale(1) brightness(0.7);
  box-shadow: 0 0 40px #999 inset;
}

    @keyframes bgMove {
      0% { background-position: center 0px; }
      100% { background-position: center 300px; }
    }

    #overlay {
      background: rgba(0,0,0,0.6);
      min-height: 100vh;
      position: relative;
      padding-top: 0;
      
    }

    #feedback {
      position: absolute;
      top: 180px;
      width: 100%;
      font-size: 28px;
      font-weight: bold;
      text-shadow: 0 0 20px white;
      white-space: pre-line;
    }

    #targetWrapper {
      position: fixed;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    #targetWrapper {
  z-index: 10;
}

#feedback {
  z-index: 20;
}

#leaderboard {
  z-index: 20;
}

#nameEntry {
  z-index: 100;
}

    /* 💧 WATER DROP */
#target {
  width: 120px;
  height: 160px;
  display: flex;
  align-items: center;
  justify-content: center;

  background: radial-gradient(circle at 50% 25%, #d4f7ff, #00bfff 70%);

  clip-path: polygon(
    50% 0%,
    70% 25%,
    85% 55%,
    75% 85%,
    50% 100%,
    25% 85%,
    15% 55%,
    30% 25%
  );

  box-shadow:
    0 0 25px rgba(0,200,255,0.6),
    inset 0 0 25px rgba(255,255,255,0.4);

  transition: transform 0.1s ease, box-shadow 0.1s ease;
}

  box-shadow:
    0 0 25px rgba(0,200,255,0.6),
    inset 0 0 25px rgba(255,255,255,0.4);

  transition: transform 0.1s ease, box-shadow 0.1s ease;
}

  transform: scale(1);

  box-shadow:
    0 0 25px rgba(0,200,255,0.6),
    inset 0 0 25px rgba(255,255,255,0.4);

  transition: transform 0.1s ease, box-shadow 0.1s ease;
}

#target.pulse {
  transform: scale(1.08);
  box-shadow: 0 0 45px cyan;
}
    }

    #target.hit {
      box-shadow: 0 0 70px aqua, inset 0 0 30px white;
    }

    #target.miss {
      box-shadow: 0 0 70px red, inset 0 0 30px red;
    }

.ball {
  width: 120px;
  height: 160px;

  position: absolute;
  left: 50%;
  transform: translateX(-50%);

  background: radial-gradient(circle at 50% 25%, #d4f7ff, #00bfff 70%);

  clip-path: polygon(
    50% 0%,
    70% 25%,
    85% 55%,
    75% 85%,
    50% 100%,
    25% 85%,
    15% 55%,
    30% 25%
  );

  box-shadow: 0 0 20px rgba(0,200,255,0.5);

  pointer-events: none;
}

    #bottomUI {
      position: fixed;
      bottom: 120px;
      width: 100%;
    }

    button {
      position: fixed;
      bottom: 80px;
      padding: 12px 20px;
      border-radius: 10px;
      border: none;
      z-index: 20;
    }

    #startBtn { left: 50%; transform: translateX(-50%); }
    #stopBtn { left: 20%; display:none; }
    #restartBtn { right: 20%; display:none; }

    #beatInfo {
      position: fixed;
      bottom: 10px;
      right: 10px;
      font-size: 12px;
      opacity: 0.7;
      text-align: right;
    }
  </style>
</head>

<body>

<div id="overlay">
  <h1>Drench Me 💧</h1>
  <div id="feedback"></div>
  <div id="endScreen">
  <div id="endContent"></div>
  </div>

<div id="targetWrapper">
  <div id="target"></div>
</div>
<div id="nameEntry" style="
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.85);
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 100;
">
<div id="targetPreview">
  <svg viewBox="0 0 100 140" width="120" height="160">
    <path d="M50 0 
             C75 35, 95 70, 50 140 
             C5 70, 25 35, 50 0 Z"
          fill="url(#grad)" />

    <defs>
      <radialGradient id="grad" cx="50%" cy="25%">
        <stop offset="0%" stop-color="#d4f7ff"/>
        <stop offset="70%" stop-color="#00bfff"/>
      </radialGradient>
    </defs>
  </svg>
</div>
  <div style="font-size: 24px; margin-bottom: 10px;">
    Enter Your Name
  </div>

  <input id="playerName" type="text" placeholder="Producer Name"
    style="padding:10px; border-radius:8px; border:none; font-size:16px;" />

  <button onclick="submitName()"
    style="margin-top:10px; padding:10px 20px; border:none; border-radius:8px;">
    Submit
  </button>

</div>
<div id="bottomUI">
  <div id="leaderboard" style="display:none;">
    <b>Top Scores</b>
    <div id="leaderboardList"></div>
  </div>
  <div id="score">Score: 0</div>
  <div id="streak">Streak: 0</div>
</div>
  <div id="topScore" style="
  position: fixed;
  top: 10px;
  right: 10px;
  font-size: 14px;
  opacity: 0.8;
">
Top Score: 0
  </div>

<button id="startBtn" onclick="startGame()">Start</button>
<button id="stopBtn" onclick="stopGame()">Quit</button>
<button id="restartBtn" onclick="restartGame()">Restart</button>

<div id="beatInfo">
  Beat: "Drench Me"<br>
  Producer: CannaprizeBEATS/EazyMoney
</div>

<audio id="beat" src="DrenchMe2 Mastered.mp3"></audio>

<script>
let bestStreak = 0;
let bpm = 120;
let beatInterval = (60000 / bpm);

let gameStarted = false;
let score = 0;
let streak = 0;

let balls = [];
let targetCenter = 0;
let spawnTimeout;
let pulseInterval;

let lastLine = "";
let endingGame = false;

/* PRAISE */
function randomPerfect() {
  const lines = [
    "PERFECT 💧","DRIPPIN 🔥","SOAKED 😮‍🔥",
    "WATER GOD 🌊","LOCKED IN 💎","ABSOLUTE DRIP",
    "UNTOUCHABLE","PURE FLOW","YOU BUILT DIFFERENT"
  ];
  return lines[Math.floor(Math.random() * lines.length)];
}

function randomGood() {
  const lines = [
    "Nice 💧","Clean drip","Keep it flowing",
    "That was smooth","You getting wet now",
    "Almost perfect"
  ];
  return lines[Math.floor(Math.random() * lines.length)];
}

/* DISSES */
function randomDiss() {
  const lines = [
    "Dry as hell 😭",
    "No drip detected",
    "You missed EVERYTHING",
    "The beat dodging you",
    "Embarrassing",
    "Stay thirsty I guess",
    "Completely off",
    "You allergic to rhythm?"
  ];
  return lines[Math.floor(Math.random() * lines.length)];
}
function startGame() {
  if (gameStarted) return;
  gameStarted = true;
  endingGame = false;
  document.getElementById("leaderboard").style.display = "none";
  document.getElementById("targetWrapper").style.display = "block";
document.getElementById("endScreen").style.display = "none";

  document.getElementById("startBtn").style.display = "none";
  document.getElementById("stopBtn").style.display = "block";
  document.getElementById("restartBtn").style.display = "none";

  let rect = document.getElementById("target").getBoundingClientRect();
  targetCenter = rect.top + rect.height / 2;

  let audio = document.getElementById("beat");
  audio.currentTime = 0;
  audio.play().catch(err => console.log("Audio blocked:", err));

  audio.onended = endGame;

  startPulse();
  spawnLoop();
}


function stopGame() {
  gameStarted = false;
  clearTimeout(spawnTimeout);
  clearInterval(pulseInterval);
  document.getElementById("beat").pause();

  balls.forEach(b => b.el.remove());
  balls = [];

  document.getElementById("startBtn").style.display = "block";
  document.getElementById("stopBtn").style.display = "none";
  document.getElementById("restartBtn").style.display = "block";

  if (!endingGame) {
    document.getElementById("feedback").innerText = "Are you not Drenched?!";
  }
}

function endGame() {
  endingGame = true;
  stopGame();
  document.getElementById("endScreen").style.display = "flex";

document.getElementById("endContent").innerHTML = `
  <div style="font-size: 36px;">Beat Finished 💧</div>

  <div style="margin-top: 15px; font-size: 22px;">
    Score: ${score}
  </div>

  <div style="font-size: 22px;">
    Best Streak: ${bestStreak}
  </div>

  <div style="margin-top: 20px; font-size: 20px;">
    ${bestStreak >= 100 
      ? "Congrats you won a Free Drench Me Shirt 👕💧"
      : "Try again."}
  </div>
`;
  document.getElementById("targetWrapper").style.display = "none";

let resultMessage = "";

if (bestStreak >= 100) {
  resultMessage = "Congrats you won a Free Drench Me Shirt 👕💧";
} else {
  resultMessage = "Try again.";
}

document.getElementById("feedback").innerHTML =
  `<div style="margin-top: 40px;">
    <div style="font-size: 32px;">Beat Finished 💧</div>
    <div style="margin-top: 10px;">Score: ${score}</div>
    <div>Best Streak: ${bestStreak}</div>
    <div style="margin-top: 20px;">${resultMessage}</div>
  </div>`;

document.getElementById("nameEntry").style.display = "flex";
  setTimeout(() => {
  document.getElementById("playerName").focus();
}, 100);

      
}
  function createSplash(x, y) {
  for (let i = 0; i < 6; i++) {
    const d = document.createElement("div");
    d.className = "droplet";

    const dx = (Math.random() - 0.5) * 300;
const dy = -(Math.random() * 200);
    d.style.animationDelay = (Math.random() * 0.1) + "s";
    d.style.left = x + "px";
    d.style.top = y + "px";
    d.style.setProperty("--x", dx + "px");
    d.style.setProperty("--y", dy + "px");

    document.body.appendChild(d);

    setTimeout(() => d.remove(), 500);
  }
  }

function restartGame() {
  score = 0;
  streak = 0;
  updateUI();
  document.getElementById("feedback").innerText = "";
  startGame();
}
  function submitName() {
  let input = document.getElementById("playerName");
  let name = input.value.trim();

  if (!name) name = "Anonymous Producer";

  let scores = JSON.parse(localStorage.getItem("beatVaultScores")) || [];

  scores.push({ name: name, score: score });
  scores.sort((a, b) => b.score - a.score);
  scores = scores.slice(0, 5);

  localStorage.setItem("beatVaultScores", JSON.stringify(scores));

  document.getElementById("nameEntry").style.display = "none";
  renderLeaderboard();
  }

function startPulse() {
  let target = document.getElementById("target");

  pulseInterval = setInterval(() => {
    target.classList.add("pulse");
    setTimeout(() => target.classList.remove("pulse"), 120);
  }, beatInterval);
}

function spawnLoop() {
  if (!gameStarted) return;
setTimeout(spawnBall, beatInterval * 0.7);
  spawnTimeout = setTimeout(spawnLoop, beatInterval);
}

function spawnBall() {
  let ball = document.createElement("div");
  ball.classList.add("ball");
  ball.style.top = "-200px";
  document.body.appendChild(ball);

  let startTime = Date.now();
  let obj = { el: ball, hit: false };
  balls.push(obj);

  function animate() {
    let progress = (Date.now() - startTime) / beatInterval;
    let endY = targetCenter - (ball.offsetHeight / 2);
    ball.style.top = (progress * (endY + 200)) + "px";

    if (progress >= 1.3) {
      ball.remove();
      balls = balls.filter(b => b !== obj);
      return;
    }

    requestAnimationFrame(animate);
  }

  animate();
}

function handleInput() {
  if (!balls.length) return;

  let target = document.getElementById("target");
  let feedback = document.getElementById("feedback");

  let best = null;
  let smallestDiff = Infinity;

  balls.forEach(b => {
    if (b.hit) return;
    let rect = b.el.getBoundingClientRect();
    let center = rect.top + rect.height / 2;
    let diff = Math.abs(center - targetCenter);

    if (diff < smallestDiff) {
      smallestDiff = diff;
      best = b;
    }
  });

  if (!best) return;

  let rect = best.el.getBoundingClientRect();
  let center = rect.top + rect.height / 2;
  let diff = Math.abs(center - targetCenter);

  target.classList.remove("hit", "miss");

if (diff < 25) {
  score += 100;
  streak++;

  if (streak > bestStreak) {
    bestStreak = streak;
  }

  feedback.innerText = randomPerfect();
  target.classList.add("hit");

  let targetRect = target.getBoundingClientRect();
  createSplash(
    targetRect.left + targetRect.width / 2,
    targetRect.top + targetRect.height / 2
  );
}
    else if (diff < 60) {let targetRect = target.getBoundingClientRect();
createSplash(
  targetRect.left + targetRect.width / 2,
  targetRect.top + targetRect.height / 2
);
    score += 50;
    streak++;
    feedback.innerText = randomGood();
    target.classList.add("hit");

  } else {
    streak = 0;
    feedback.innerText = randomDiss();
    target.classList.add("miss");
document.body.style.opacity = "0.9";
    target.classList.add("dry");
setTimeout(() => target.classList.remove("dry"), 300);

setTimeout(() => {
  document.body.style.opacity = "1";
}, 100);


  }

  best.hit = true;

  let scoreEl = document.getElementById("score");
  scoreEl.style.transform = "scale(1.2)";
  setTimeout(() => scoreEl.style.transform = "scale(1)", 100);

  target.style.transform = "scale(1.1)";
setTimeout(() => {
  target.style.transform = "scale(1)";
}, 100);

  updateUI();
}

function updateUI() {
  document.getElementById("score").innerText = "Score: " + score;
  document.getElementById("streak").innerText = "Streak: " + streak;
}

function saveScore(finalScore) {
  let name = prompt("Enter your name:");

  if (!name || name.trim() === "") {
    name = "Anonymous Producer";
  } else {
    name = name.trim();
  }

  let scores = JSON.parse(localStorage.getItem("beatVaultScores")) || [];

  scores.push({ name: name, score: finalScore });
  scores.sort((a, b) => b.score - a.score);
  scores = scores.slice(0, 5);

  localStorage.setItem("beatVaultScores", JSON.stringify(scores));
  renderLeaderboard();
}
function renderLeaderboard() {
  let list = document.getElementById("leaderboardList");
  let topScoreEl = document.getElementById("topScore");

  let scores = JSON.parse(localStorage.getItem("beatVaultScores")) || [];

  list.innerHTML = scores.map((s, i) =>
    `${i+1}. ${s.name} - ${s.score}`
  ).join("<br>");

  // 👇 FIXED TOP SCORE
  if (scores.length > 0 && topScoreEl) {
    topScoreEl.innerText = "Top Score: " + scores[0].score;
  }
}

document.addEventListener("pointerdown", handleInput);
renderLeaderboard();
</script>

</body>
</html>
